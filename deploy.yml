---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie
  template:
    metadata:
      labels:
        app: movie
    spec:
      containers:
        - name: cont1
          image: venusama/nginx:fruitscollection
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: "/opt/tmp"
              name: devops


        - name: cont2
          image: ubuntu
          command: ["/bin/bash", "-c", "while true; do echo welcome to devops; sleep 10; done"]
          volumeMounts:
            - mountPath: "/tmp/docker"
              name: devops
       
      volumes:
        - name: devops
          persistentVolumeClaim:
            claimName: pvc1   
