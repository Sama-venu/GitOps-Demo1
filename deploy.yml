---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: movie
  template:
    metadata:
      labels:
        app: movie
    spec:
      containers:
        - name: cont1
          image: venusama/movies:HollywoodCollection
          ports:
            - containerPort: 80
          volumeMounts:
            - mountPath: "/opt/tmp"  


        - name: cont2
          image: ubuntu
          command: ["/bin/bash", "-c", "while true; do echo welcome to devops; sleep 10; done"]
          volumeMounts:
            - mountpath: "/tmp/docker"
       
      volumes:
        name: devops
        persistentVolumeclaim:
          - claimName: pvc1   
